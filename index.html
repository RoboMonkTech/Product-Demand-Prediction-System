<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Product Demand Prediction System</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<header>

<h1><i class="fa-solid fa-box-open"></i> Product Demand Prediction System</h1>

<p>Retail AI Dashboard using Machine Learning</p>

</header>

<div class="container">

<div class="card">

<h2>Product Information</h2>

<div class="form-group">

<label>Product Name</label>

<input type="text" id="product" placeholder="Enter Product Name">

</div>

<div class="form-group">

<label>Product Category</label>

<select id="category">

<option>Electronics</option>

<option>Clothing</option>

<option>Groceries</option>

<option>Home Appliances</option>

<option>Sports</option>

</select>

</div>

<div class="form-group">

<label>Product Price (₹)</label>

<input type="number" id="price" placeholder="Enter Price">

</div>

<div class="form-group">

<label>Stock Available</label>

<input type="number" id="stock" placeholder="Available Stock">

</div>

<div class="form-group">

<label>Previous Month Sales</label>

<input type="number" id="sales" placeholder="Units Sold">

</div>

<div class="form-group">

<label>Customer Rating (1-5)</label>

<input type="number" step="0.1" id="rating" placeholder="Rating">

</div>

<button onclick="predictDemand()">

<i class="fa-solid fa-chart-line"></i>

Predict Product Demand

</button>

</div>

<div class="card result-card" id="resultBox">

<div class="icon">

<i class="fa-solid fa-chart-column"></i>

</div>

<h2>Prediction Result</h2>

<h1 id="output">Waiting for Prediction...</h1>

<p id="message">

Enter product details and click Predict Product Demand.

</p>

<table>

<tr>

<td><b>Confidence</b></td>

<td id="confidence">--</td>

</tr>

<tr>

<td><b>Demand Category</b></td>

<td id="demand">--</td>

</tr>

</table>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
